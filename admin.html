<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | Top Hat Cleaners</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" href="img/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
.modal-bg { position: fixed; inset: 0; background: rgba(45,34,53,0.7); backdrop-filter: blur(6px); z-index: 100; display: none; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
.modal-bg.open { display: flex; }
.modal { background: var(--cream); border-radius: var(--r-lg); width: 100%; max-width: 850px; box-shadow: 0 30px 80px rgba(45,34,53,0.4); margin: 14px 0; overflow: hidden; }
.modal-h { background: white; padding: 14px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-t { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: 18px; color: var(--plum); }
.modal-x { width: 36px; height: 36px; border-radius: 50%; background: var(--lavender-pale); border: none; cursor: pointer; font-size: 16px; color: var(--plum); }
.modal-foot { padding: 14px 22px; background: white; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

.wo { background: linear-gradient(160deg, var(--cream) 0%, var(--lavender-pale) 100%); padding: 36px; font-family: Georgia, serif; }
@media (max-width: 600px) { .wo { padding: 24px 18px; } }
.wo-h { border-bottom: 2px solid var(--plum); padding-bottom: 18px; margin-bottom: 22px; display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; }
@media (max-width: 600px) { .wo-h { grid-template-columns: 1fr; text-align: center; } .wo-m { text-align: center; } }
.wo-l { width: 70px; height: 70px; }
.wo-bn { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 800; font-size: 26px; color: var(--plum); }
.wo-bt { font-family: 'Playfair Display', serif; font-style: italic; font-size: 13px; color: var(--mauve); letter-spacing: 1.8px; margin-top: 4px; }
.wo-m { text-align: right; }
.wo-mt { font-weight: 700; font-size: 9px; color: var(--gold); letter-spacing: 2.5px; text-transform: uppercase; }
.wo-mn { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: 17px; color: var(--plum); }
.wo-s { margin-bottom: 20px; }
.wo-st { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 700; font-size: 17px; color: var(--plum); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.wo-g { display: grid; grid-template-columns: 130px 1fr; gap: 6px 12px; font-size: 13px; }
@media (max-width: 600px) { .wo-g { grid-template-columns: 1fr; } .wo-g dt { margin-top: 8px; } }
.wo-g dt { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 1.3px; color: var(--mauve-light); padding-top: 2px; }
.wo-g dd { color: var(--ink); font-weight: 500; }
.wo-g dd.b { font-weight: 700; color: var(--plum); }
.wo-cl { background: white; border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px 18px; }
.wo-cl-s { margin-bottom: 12px; }
.wo-cl-t { font-weight: 700; font-size: 11px; color: var(--plum); text-transform: uppercase; letter-spacing: 1.3px; margin-bottom: 6px; }
.wo-cl ul { list-style: none; columns: 2; column-gap: 24px; }
@media (max-width: 600px) { .wo-cl ul { columns: 1; } }
.wo-cl li { font-size: 12.5px; color: var(--ink); padding: 2px 0; break-inside: avoid; }
.wo-cl li::before { content: '☐  '; color: var(--mauve); }
.wo-n { background: rgba(184,151,94,0.08); border: 1px solid rgba(184,151,94,0.3); border-left: 4px solid var(--gold); border-radius: var(--r-sm); padding: 12px 16px; font-style: italic; font-size: 13px; line-height: 1.5; }
.wo-r { background: var(--lavender-pale); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 14px 18px; font-size: 12px; color: var(--mauve); }
.wo-r ul { list-style: none; }
.wo-r li::before { content: '✦  '; color: var(--gold); font-weight: bold; }
.wo-f { margin-top: 24px; padding-top: 16px; border-top: 2px solid var(--plum); text-align: center; font-style: italic; font-size: 11px; color: var(--mauve); }
.wo-fb { font-weight: 700; color: var(--plum); font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }

@media print {
  .adm-bar, .modal-h, .modal-foot, .no-print { display: none !important; }
  .modal-bg.open { background: white !important; padding: 0 !important; display: flex !important; position: static !important; }
  .modal { box-shadow: none !important; border-radius: 0 !important; max-width: 100% !important; margin: 0 !important; }
  .wo { padding: 24px !important; background: white !important; }
  body { background: white !important; }
  @page { margin: 0.4in; size: letter; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login">
  <div class="login-card">
    <img src="img/logo.png" alt="" class="login-logo"/>
    <div class="login-title">Top Hat Cleaners</div>
    <div class="login-sub">Admin Dashboard</div>
    <div class="login-error" id="loginError">Invalid email or password.</div>
    <div class="field" style="margin-bottom:10px;">
      <input type="email" id="emailInput" placeholder="Email" autocomplete="username" style="text-align:center;"/>
    </div>
    <div class="field">
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" style="text-align:center;"/>
    </div>
    <button class="btn btn-p btn-lg" style="width:100%;margin-top:14px;" onclick="tryLogin()">Sign In</button>
    <div style="margin-top:18px;font-size:12px;"><a href="index.html" style="color:var(--mauve);">← Back to website</a></div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp" style="display:none;">
  <header class="adm-bar">
    <div class="adm-brand">
      <img src="img/logo-dark.png" alt=""/>
      <div class="adm-brand-text">Top Hat Cleaners<span>Admin Dashboard</span></div>
    </div>
    <div class="adm-btns">
      <button class="adm-btn" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="adm-btn" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="wrap">

    <div class="stats">
      <div class="stat"><div class="stat-n" id="statTotal">0</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-n" id="statPending">0</div><div class="stat-l">Pending</div></div>
      <div class="stat"><div class="stat-n" id="statConfirmed">0</div><div class="stat-l">Confirmed</div></div>
      <div class="stat"><div class="stat-n" id="statUpcoming">0</div><div class="stat-l">Next 7 Days</div></div>
    </div>

    <div class="fbar">
      <button class="fpill on" data-filter="all">All</button>
      <button class="fpill" data-filter="pending">⏳ Pending</button>
      <button class="fpill" data-filter="confirmed">✓ Confirmed</button>
      <button class="fpill" data-filter="completed">✦ Completed</button>
      <button class="fpill" data-filter="cancelled">✕ Cancelled</button>
      <input type="text" class="search" id="searchBox" placeholder="Search by name, address, ID..."/>
    </div>

    <div id="bookingList"></div>

  </div>
</div>

<!-- WORK ORDER MODAL -->
<div class="modal-bg" id="modalBackdrop">
  <div class="modal">
    <div class="modal-h">
      <div class="modal-t">Work Order</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="wo" id="workOrder"></div>
    <div class="modal-foot">
      <button class="btn btn-s" onclick="closeModal()">Close</button>
      <button class="btn btn-p" onclick="window.print()">🖨 Print / Save PDF</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
let sb = null;
let bookings = [];
let activeFilter = 'all';
let searchQuery = '';

// Initialize Supabase
if (window.SUPABASE_CONFIG && window.SUPABASE_CONFIG.url !== 'YOUR_SUPABASE_URL_HERE') {
  sb = window.supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
}

// Auto-show admin if already logged in
async function init() {
  if (!sb) {
    document.getElementById('loginError').textContent = 'Supabase not configured. Edit config.js with your project URL and anon key.';
    document.getElementById('loginError').classList.add('show');
    return;
  }
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp();
}
init();

async function tryLogin() {
  if (!sb) return;
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  if (!email || !password) {
    document.getElementById('loginError').textContent = 'Please enter email and password';
    document.getElementById('loginError').classList.add('show');
    return;
  }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('loginError').textContent = error.message || 'Invalid email or password';
    document.getElementById('loginError').classList.add('show');
    return;
  }
  showApp();
}

document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('emailInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

async function logout() {
  if (sb) await sb.auth.signOut();
  location.reload();
}

async function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
  await loadBookings();
}

async function loadBookings() {
  if (!sb) return;
  const { data, error } = await sb.from('bookings').select('*').order('service_date', { ascending: true });
  if (error) { console.error(error); return; }
  bookings = data || [];
  renderAll();
}

function renderAll() { renderStats(); renderBookings(); }

function renderStats() {
  const total = bookings.length;
  const pending = bookings.filter(b => (b.status || 'pending') === 'pending').length;
  const confirmed = bookings.filter(b => b.status === 'confirmed').length;
  const now = new Date();
  const next7 = new Date(); next7.setDate(now.getDate() + 7);
  const upcoming = bookings.filter(b => {
    if (!b.service_date) return false;
    const d = new Date(b.service_date + 'T12:00:00');
    return d >= now && d <= next7 && b.status !== 'cancelled';
  }).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statConfirmed').textContent = confirmed;
  document.getElementById('statUpcoming').textContent = upcoming;
}

function renderBookings() {
  let filtered = bookings;
  if (activeFilter !== 'all') filtered = filtered.filter(b => (b.status || 'pending') === activeFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(b =>
      (b.client_name || '').toLowerCase().includes(q) ||
      (b.address || '').toLowerCase().includes(q) ||
      (b.id || '').toLowerCase().includes(q) ||
      (b.client_phone || '').includes(q) ||
      (b.client_email || '').toLowerCase().includes(q)
    );
  }
  const wrap = document.getElementById('bookingList');
  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty"><div class="empty-i">🎩</div><div style="color:var(--mauve);font-style:italic;">${bookings.length === 0 ? 'No bookings yet — share your booking link to get started!' : 'No bookings match these filters.'}</div></div>`;
    return;
  }
  wrap.innerHTML = `<div class="b-list">${filtered.map(b => {
    const initial = (b.client_name || '?').charAt(0).toUpperCase();
    const status = b.status || 'pending';
    const dateStr = b.service_date ? new Date(b.service_date + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '—';
    return `<div class="b-row">
      <div class="b-icon">${initial}</div>
      <div>
        <div class="b-name">${b.client_name || 'No name'}<span class="badge ${status}">${status}</span><span class="b-id">${b.id}</span></div>
        <div class="b-meta">
          <strong>${b.service_type || 'Service TBD'}</strong> · ${dateStr}${b.service_time ? ' · ' + b.service_time : ''}<br/>
          ${b.address || 'No address'}<br/>
          <span style="font-size:11px;color:var(--muted);">📞 ${b.client_phone || '—'} · ✉ ${b.client_email || '—'}</span>
        </div>
      </div>
      <div class="b-acts">
        <button class="b-act" title="View Work Order" onclick='viewBooking("${b.id}")'>👁</button>
        <button class="b-act" title="Confirm" onclick='setStatus("${b.id}","confirmed")'>✓</button>
        <button class="b-act" title="Mark Complete" onclick='setStatus("${b.id}","completed")'>✦</button>
        <button class="b-act danger" title="Cancel/Delete" onclick='deleteBooking("${b.id}")'>🗑</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

document.querySelectorAll('.fpill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.fpill').forEach(x => x.classList.remove('on'));
    p.classList.add('on');
    activeFilter = p.dataset.filter;
    renderBookings();
  });
});
document.getElementById('searchBox').addEventListener('input', e => { searchQuery = e.target.value; renderBookings(); });

async function setStatus(id, status) {
  const { error } = await sb.from('bookings').update({ status }).eq('id', id);
  if (error) console.error(error);
  await loadBookings();
}

async function deleteBooking(id) {
  if (!confirm('Delete this booking? This cannot be undone.')) return;
  const { error } = await sb.from('bookings').delete().eq('id', id);
  if (error) console.error(error);
  await loadBookings();
}

function exportCSV() {
  if (bookings.length === 0) { alert('No bookings to export'); return; }
  const fields = ['id','created_at','status','client_name','client_phone','client_email','address','property_type','bedrooms','bathrooms','square_footage','service_type','frequency','service_date','service_time'];
  const lines = [fields.join(',')];
  bookings.forEach(b => lines.push(fields.map(f => `"${(b[f] || '').toString().replace(/"/g, '""')}"`).join(',')));
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `tophat-bookings-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

const SVC_CHECKLISTS = {
  "The Refresh — Basic Clean": {
    "Kitchen": ["Wipe countertops", "Clean stovetop", "Clean microwave inside & out", "Wipe appliance exteriors", "Empty trash & replace liner", "Sweep & mop floors"],
    "Bathrooms": ["Clean sink, counter, mirror", "Clean toilet inside & out", "Clean shower / tub", "Empty trash & replace liner", "Sweep & mop floors"],
    "Bedrooms & Common Areas": ["Dust all reachable surfaces", "Make beds (linens to be left by client)", "Vacuum carpets / sweep hard floors", "Empty trash & replace liner"],
    "General": ["Mirrors throughout the home", "Light switches & door handles wiped", "Take before/after photos"]
  },
  "The Signature — Deep Clean": {
    "Kitchen": ["Everything in Refresh", "Wipe cabinet fronts", "Inside microwave detailed", "Backsplash detailed", "Behind & under small appliances if reachable"],
    "Bathrooms": ["Everything in Refresh", "Detail tile grout in showers", "Wipe vents, ledges, fixtures", "Polish chrome and fixtures"],
    "Bedrooms & Common Areas": ["Everything in Refresh", "Dust ceiling fans & light fixtures", "Dust window sills, ledges, blinds", "Wipe baseboards throughout", "Vacuum under furniture where possible"],
    "General": ["Wipe all doors and door frames", "Detail HVAC vents", "Take before/after photos"]
  },
  "The Fresh Start — Move-In/Out": {
    "Kitchen": ["Inside refrigerator & freezer", "Inside oven (deep)", "Inside microwave & dishwasher", "Inside ALL cabinets & drawers", "Behind appliances if movable"],
    "Bathrooms": ["Everything in Signature", "Inside ALL cabinets & drawers", "Detail bathtub jets if applicable", "Inside medicine cabinets"],
    "Bedrooms & Common Areas": ["Everything in Signature", "Inside ALL closets, cabinets, drawers", "Interior windows & tracks", "Inside laundry/utility rooms"],
    "General": ["All doors & frames wiped", "Light fixtures detailed", "Floors waxed/polished if applicable", "Detailed photos throughout"]
  },
  "The Turnover — Airbnb": {
    "Full Turnover": ["Complete clean of all rooms", "Strip & change all bed linens", "Place fresh towels (per host's specs)", "Restock provided amenities", "Wipe inside fridge & remove old food"],
    "Kitchen": ["Wash any dishes left", "Clean counters, sink, stovetop", "Empty all trash", "Stage as host requested"],
    "Final Touches": ["Stage beds & towels neatly", "Take before/after photos", "Send completion confirmation to host"]
  },
  "The Executive — Commercial": {
    "Workspaces": ["Wipe all desks & workstations", "Sanitize phones, keyboards, door handles", "Empty all trash bins", "Vacuum carpets / mop hard floors"],
    "Restrooms": ["Full restroom detail", "Restock supplies (if provided)", "Sanitize all touch points"],
    "Common Areas": ["Reception desk", "Conference rooms", "Break room: counters, sink, fridge exterior", "Glass doors and windows"],
    "Final": ["Lock up per client instructions", "Set alarm if applicable", "Take before/after photos"]
  },
  "The Reveal — Post-Construction": {
    "Phase 1 — Debris": ["Remove all construction debris", "Vacuum all dust from surfaces", "Vacuum HVAC vents & registers"],
    "Phase 2 — Detail Wipe": ["Wipe ALL surfaces top to bottom", "Wipe inside cabinets & drawers", "Clean inside all appliances", "Detail all windows & tracks"],
    "Phase 3 — Floors": ["Vacuum entire space twice", "Mop hard floors with appropriate cleaner", "Spot-clean any paint / adhesive residue"],
    "Final": ["Inspect every room", "Polish fixtures to mirror finish", "Take before/after photos throughout"]
  }
};

function viewBooking(id) {
  const b = bookings.find(x => x.id === id);
  if (!b) return;
  const checklist = SVC_CHECKLISTS[b.service_type] || {};
  let cls = '';
  for (const [section, items] of Object.entries(checklist)) {
    cls += `<div class="wo-cl-s"><div class="wo-cl-t">${section}</div><ul>${items.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
  }
  const dateStr = b.service_date ? new Date(b.service_date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' }) : '—';
  document.getElementById('workOrder').innerHTML = `
    <div class="wo-h">
      <img src="img/logo.png" class="wo-l" alt=""/>
      <div style="text-align:center;">
        <div class="wo-bn">Top Hat Cleaners</div>
        <div class="wo-bt">— Cleaning with Class —</div>
      </div>
      <div class="wo-m"><div class="wo-mt">Work Order</div><div class="wo-mn">#${b.id}</div></div>
    </div>
    <div class="wo-s">
      <div class="wo-st">Service Schedule</div>
      <dl class="wo-g">
        <dt>Date</dt><dd class="b">${dateStr}</dd>
        <dt>Arrival</dt><dd class="b">${b.service_time || '—'}</dd>
        <dt>Service Type</dt><dd class="b">${b.service_type || '—'}</dd>
        <dt>Frequency</dt><dd>${b.frequency || 'One-Time'}</dd>
      </dl>
    </div>
    <div class="wo-s">
      <div class="wo-st">Property &amp; Access</div>
      <dl class="wo-g">
        <dt>Address</dt><dd class="b">${b.address || '—'}</dd>
        <dt>Property Type</dt><dd>${b.property_type || '—'}</dd>
        <dt>Size</dt><dd>${b.bedrooms} BR / ${b.bathrooms} BA${b.square_footage ? ' · ~' + b.square_footage + ' sqft' : ''}</dd>
        <dt>Access</dt><dd class="b">${b.access_method || '—'}</dd>
        ${b.access_code ? `<dt>Code / Notes</dt><dd class="b" style="color:var(--gold)">${b.access_code}</dd>` : ''}
        <dt>Pets</dt><dd>${b.pets || 'None'}</dd>
      </dl>
    </div>
    <div class="wo-s">
      <div class="wo-st">Cleaning Checklist</div>
      <div class="wo-cl">${cls}</div>
    </div>
    ${b.notes ? `<div class="wo-s"><div class="wo-st">Special Instructions</div><div class="wo-n">${b.notes.replace(/\n/g, '<br>')}</div></div>` : ''}
    <div class="wo-s">
      <div class="wo-st">Reminders for Cleaner</div>
      <div class="wo-r"><ul>
        <li>Arrive within the time window. Text dispatcher upon arrival.</li>
        <li>Take BEFORE photos of every room before starting.</li>
        <li>Take AFTER photos of every room when complete.</li>
        <li>Send all photos to dispatcher within 30 min of completion.</li>
        <li>Lock up properly and reset alarm if applicable.</li>
        <li>If anything is unclear, call dispatcher BEFORE proceeding.</li>
      </ul></div>
    </div>
    <div class="wo-f">
      <div class="wo-fb">Top Hat Cleaners · San Antonio, TX</div>
      tophatcleaners210@gmail.com · (726) 888-9821
    </div>
  `;
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal() { document.getElementById('modalBackdrop').classList.remove('open'); }
</script>

</body>
</html>
